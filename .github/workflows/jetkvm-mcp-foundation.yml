name: JetKVM MCP production runtime

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "*.go"
      - "tools/jetkvm-mcp/**"
      - "ui/**"
      - "internal/**/*.go"
      - "internal/**/*.c"
      - "internal/**/*.h"
      - "go.mod"
      - "go.sum"
  push:
    paths:
      - ".github/workflows/*.yml"
      - "*.go"
      - "tools/jetkvm-mcp/**"
      - "ui/**"
      - "internal/**/*.go"
      - "internal/**/*.c"
      - "internal/**/*.h"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

jobs:
  mcp:
    name: MCP Phase 2 through Phase 5 clean-checkout gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/jetkvm-mcp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.23.1"
          cache: "npm"
          cache-dependency-path: "tools/jetkvm-mcp/package-lock.json"
      - name: Assert Node.js version
        run: test "$(node --version)" = "v22.23.1"
      - name: Install dependencies
        run: npm ci
      - name: Run Phase 2 contract suite
        run: npm run test:phase2
      - name: Install Chromium for the real UI fixture
        run: npx playwright install --with-deps chromium
      - name: Run Phase 3 focused gate
        run: npm run test:phase3
      - name: Run Phase 4 power and session gate
        run: npm run test:phase4
      - name: Run complete MCP package suite
        run: npm test
      - name: Validate canonical stories
        run: npm run stories:validate
      - name: Ground every reviewed branch matrix cell
        run: npm run branch-matrix:check
      - name: Run all story-derived system scenarios
        run: npm run stories:e2e
      - name: Check generated schemas
        run: npm run schemas:check
      - name: Execute setup and client examples
        run: npm run examples:check
      - name: Check documentation consistency
        run: npm run docs:check
      - name: Typecheck
        run: npm run typecheck
      - name: Build package
        run: npm run build
      - name: Run installed schema contract E2E
        run: npm run smoke:installed-contracts
      - name: Run installed legacy SSE protocol E2E
        run: npm run smoke:installed-sse-protocol
      - name: Run installed all-tool stdio protocol E2E
        run: npm run smoke:installed-stdio-protocol
      - name: Test installed lease runner
        run: npm run test:installed-lease
      - name: Verify package dry run and allowlist
        run: npm run package:check

  ui-phase3:
    name: UI Phase 3 gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.23.1"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"
      - name: Assert Node.js version
        run: test "$(node --version)" = "v22.23.1"
      - name: Install dependencies
        run: npm ci
      - name: Run UI Phase 3 focused gate
        run: npm run test:phase3
      - name: Typecheck UI
        run: npm run typecheck

  foundation-go:
    name: Foundation Go race tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.1"
          cache: true
          cache-dependency-path: "go.sum"
      - name: Create empty resource directory
        run: mkdir -p static && touch static/.gitkeep
      - name: Run host-safe race tests
        run: go test -race -tags=hosttest . ./internal/atx ./internal/native ./internal/controlsession ./internal/usbgadget
